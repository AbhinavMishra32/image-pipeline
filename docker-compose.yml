services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: image_pipeline
      POSTGRES_USER: image_pipeline
      POSTGRES_PASSWORD: image_pipeline
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U image_pipeline -d image_pipeline"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      API_HOST: 0.0.0.0
      PORT: 3001
      DATABASE_URL: postgresql://image_pipeline:image_pipeline@postgres:5432/image_pipeline
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: media
      MINIO_USE_SSL: "false"
      JWT_SECRET: development-super-secret
      AUTH_RATE_LIMIT_MAX: 10
      AUTH_RATE_LIMIT_WINDOW_MS: 60000
      UPLOAD_RATE_LIMIT_MAX: 30
      UPLOAD_RATE_LIMIT_WINDOW_MS: 60000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    ports:
      - "3001:3001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node --eval \"fetch('http://127.0.0.1:3001/api/health').then((res) => res.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 10
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://image_pipeline:image_pipeline@postgres:5432/image_pipeline
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_USE_SSL: "false"
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_CAPTION_MODEL: ${OPENROUTER_CAPTION_MODEL:-openrouter/free}
      OPENROUTER_LABEL_MODEL: ${OPENROUTER_LABEL_MODEL:-openrouter/free}
      OPENROUTER_SAFETY_MODEL: ${OPENROUTER_SAFETY_MODEL:-openrouter/free}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  pgdata:
  minio-data:
